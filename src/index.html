<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <title>HOMMA</title>

  <base href="/"/>

  <meta name="format-detection" content="telephone=no"/>
  <meta name="msapplication-tap-highlight" content="no"/>

<link rel="icon" type="image/png" href="assets/icon/favicon.ico"/>

  <!-- add to homescreen for ios -->
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icon/apple-touch-icon.png">
  <meta name="theme-color" content="#1976d2">
</head>

<body>
  <app-root>
    <!-- Loading fallback - shown until Angular bootstraps, respects dark/light mode -->
    <style>
      .app-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        text-align: center;
        padding: 20px;
        box-sizing: border-box;
      }
      /* Respect user's color scheme preference */
      @media (prefers-color-scheme: dark) {
        .app-loading { background: #1e1e1e; color: #e0e0e0; }
        .app-loading-spinner { border-top-color: #4194ab; }
      }
      @media (prefers-color-scheme: light) {
        .app-loading { background: #ffffff; color: #333333; }
        .app-loading-spinner { border-top-color: #4194ab; }
      }
      .app-loading-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(128, 128, 128, 0.3);
        border-top: 4px solid #4194ab;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .app-loading h2 {
        margin: 0 0 10px 0;
        font-size: 18px;
        font-weight: 600;
      }
      .app-loading p {
        margin: 0;
        font-size: 14px;
        opacity: 0.7;
        max-width: 280px;
        line-height: 1.4;
      }
      .app-loading-help {
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px solid rgba(128, 128, 128, 0.3);
        font-size: 12px;
        opacity: 0.6;
      }
    </style>
    <div class="app-loading">
      <div class="app-loading-spinner"></div>
      <h2>Loading HOMMA...</h2>
      <p>Please wait while the app loads.</p>
      <div class="app-loading-help">
        Taking too long? Try refreshing the page or check your internet connection.
      </div>
    </div>
  </app-root>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>

</html>
