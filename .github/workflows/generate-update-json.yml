name: Generate update.json on push

on:
  push:
    branches:
      - master

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install deps
        run: npm ci

      - name: Generate update.json files
        run: node scripts/generate-update-json.js

      - name: Commit update.json changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/assets/update.json docs/assets/update.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "CI: generate update.json from package.json version"
            git push origin HEAD
          fi
