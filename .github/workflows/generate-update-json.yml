name: Generate update.json on release/tags

on:
  push:
    # Run only when a git tag like v1.2.3 is pushed
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Generate update.json files
        run: node scripts/generate-update-json.js

      - name: Create Pull Request with update.json
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "CI: generate update.json from package.json version"
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          title: "CI: generate update.json"
          body: |
            This PR was created automatically by CI to update /assets/update.json
            to match the repository package.json version. Review and merge to
            publish the in-app update banner.
          labels: "auto-generated,update-json"
